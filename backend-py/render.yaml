# Render.com blueprint for the FastAPI backend.
# Apply with the "New Blueprint" flow in the Render dashboard,
# pointing at this repository.
#
# Builds from backend-py/Dockerfile, attaches a managed Postgres, and
# generates JWT_SECRET on first deploy.

services:
  - type: web
    name: hireup-fastapi
    runtime: docker
    rootDir: backend-py
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_PORT
        value: "8000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: LOG_LEVEL
        value: INFO
      - key: TRUSTED_HOSTS
        value: hireup-fastapi.onrender.com
      - key: CORS_ORIGINS
        sync: false  # set in dashboard: comma-separated frontend origins
      - key: DATABASE_URL
        fromDatabase:
          name: hireup-postgres
          property: connectionString
      - key: LOGIN_RATE_LIMIT
        value: 5/minute
      - key: REGISTER_RATE_LIMIT
        value: 3/minute

databases:
  - name: hireup-postgres
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
