name: backend-py tests

on:
  push:
    paths:
      - "backend-py/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "backend-py/**"
      - ".github/workflows/test.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hireup
          POSTGRES_PASSWORD: hireup_dev_password
          POSTGRES_DB: hireup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hireup -d hireup_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend-py

    env:
      APP_ENV: test
      JWT_SECRET: ci_secret_value_that_is_long_enough
      BCRYPT_ROUNDS: "4"
      RATE_LIMIT_PER_MINUTE: "10000"
      LOGIN_RATE_LIMIT: "10000/minute"
      REGISTER_RATE_LIMIT: "10000/minute"
      REFRESH_RATE_LIMIT: "10000/minute"
      TEST_DATABASE_URL: postgresql+asyncpg://hireup:hireup_dev_password@localhost:5432/hireup_test
      POSTGRES_HOST: localhost
      POSTGRES_DB: hireup_test
      POSTGRES_USER: hireup
      POSTGRES_PASSWORD: hireup_dev_password

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend-py/requirements/*.txt

      - name: Install libmagic
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Lint with ruff
        run: ruff check app tests

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov (optional)
        if: always()
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: backend-py/coverage.xml
          flags: backend-py
