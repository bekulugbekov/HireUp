# HireUp — Nginx production reverse-proxy config.
#
# - Port 80 redirects to 443.
# - 443 terminates TLS and proxies to the FastAPI container.
# - /uploads/ is served by Nginx directly (cheaper than going through
#   the Python app); the directory must be mounted from the host or a
#   shared volume.
# - Cross-Origin-Resource-Policy is set so the frontend on a different
#   origin can load images.
#
# TLS certificates are expected at /etc/letsencrypt/live/<host>/ —
# obtain them once with `certbot certonly --standalone -d api.hireup.uz`.

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.hireup.uz;

    ssl_certificate     /etc/letsencrypt/live/api.hireup.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hireup.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/javascript
        application/xml+rss
        application/xhtml+xml;

    # Static uploaded files — served directly from disk
    location /uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # Health probes don't need auth + are cheap; cache briefly
    location = /api/health {
        proxy_pass http://api:8000;
        proxy_cache_valid 200 5s;
        access_log off;
    }

    # Everything else → FastAPI
    location / {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
