# Production overlay.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d
#
# What this overlay changes vs docker-compose.yml:
# - Postgres port is NOT exposed to the host (only inside the docker network)
# - Both services restart: always
# - API uses the pre-built image (override IMAGE_TAG to pin)
# - Nginx terminates TLS and serves /uploads directly
# - Loads secrets from .env.production (must exist; .env.production.example is the template)

services:
  postgres:
    ports: []
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups

  api:
    image: ${API_IMAGE:-ghcr.io/your-org/hireup-backend-py:latest}
    build: null
    restart: always
    env_file:
      - .env.production
    environment:
      POSTGRES_HOST: postgres
    expose:
      - "8000"
    ports: []
    volumes:
      - uploads:/app/uploads

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/var/www/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres_data:
  uploads:
