services:
  postgres:
    image: postgres:16-alpine
    container_name: hireup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hireup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hireup_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-hireup}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hireup} -d ${POSTGRES_DB:-hireup}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hireup-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-hireup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hireup_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-hireup}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_string_at_least_32_chars}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
